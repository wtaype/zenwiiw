<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffda34" />
    <meta
      name="description"
      content="Zenwii Windows, editor de notas offline-first con sincronizacion en Firebase."
    />
    <!-- Fuentes Poppins cargadas localmente para rendimiento extremo offline -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Zenwii Windows</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div id="app">
      <main class="launch-screen">
        <img class="launch-logo" src="/icon.png" alt="Zenwii" />
        <div class="launch-text">Zenwii</div>
      </main>
    </div>
  </body>
</html>
